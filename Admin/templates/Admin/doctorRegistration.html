<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVision | Doctor Registration</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-blue: #0284c7;
            --primary-dark: #0369a1;
            --secondary-teal: #0d9488;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }

        /* Abstract Medical Background Pattern */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
            z-index: -1;
        }

        .form-card {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* Top Accent Bar */
        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--secondary-teal), var(--primary-blue));
        }

        .header-content {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            font-size: 2.5rem;
            color: var(--secondary-teal);
            margin-bottom: 0.5rem;
        }

        .brand-logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Form Controls */
        .form-label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }

        .form-control,
        .form-select,
        .form-control-file {
            border-color: var(--border-color);
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            background-color: #f8fafc;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--secondary-teal);
            box-shadow: 0 0 0 0.25rem rgba(13, 148, 136, 0.15);
            background-color: white;
        }

        .form-check-input:checked {
            background-color: var(--secondary-teal);
            border-color: var(--secondary-teal);
        }

        /* Buttons */
        .btn-medical {
            background-color: var(--secondary-teal);
            color: white;
            border: none;
            padding: 0.6rem 2rem;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: background-color 0.2s;
        }

        .btn-medical:hover {
            background-color: #0f766e;
            color: white;
        }

        .btn-outline-medical {
            background-color: white;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 0.6rem 2rem;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .btn-outline-medical:hover {
            background-color: #f1f5f9;
            color: var(--text-main);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--secondary-teal);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            margin-top: 1.5rem;
        }

        .back-link:hover {
            color: #0f766e;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="bg-pattern"></div>

    <div class="form-card">

        <div class="header-content">
            <i class="bi bi-clipboard2-pulse brand-icon"></i>
            <h2 class="brand-logo">Professional Enrollment</h2>
            <p class="subtitle">Complete application to join the SmartVision network.</p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="txt_name" class="form-label">Full Name with Title</label>
                    <input type="text" value="{{ editData.doctor_name }}" name="txt_name" id="txt_name" class="form-control" autocomplete="off"
                        placeholder="e.g. Dr. Jane Smith" required>
                </div>

                <div class="col-md-6">
                    <label for="txt_contact" class="form-label">Professional Contact</label>
                    <input type="text" value="{{ editData.doctor_contact }}" name="txt_contact" id="txt_contact" class="form-control" autocomplete="off"
                        required>
                </div>
            </div>

            <div class="mb-3">
                <label for="txt_email" class="form-label">Professional Email Address</label>
                <input type="email" value="{{ editData.doctor_email }}" name="txt_email" id="txt_email" class="form-control" autocomplete="off" required>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Gender</label>
                <div class="form-check form-check-inline mt-1">
                    <input type="radio" name="gender" id="male" value="Male" class="form-check-input" required>
                    <label for="male" class="form-check-label text-muted">Male</label>
                </div>
                <div class="form-check form-check-inline mt-1">
                    <input type="radio" name="gender" id="female" value="Female" class="form-check-input">
                    <label for="female" class="form-check-label text-muted">Female</label>
                </div>
            </div>

            <div class="mb-3">
                <label for="txt_address" class="form-label">Address</label>
                <textarea name="txt_address" value="{{ editData.doctor_address }}" id="txt_address" class="form-control" rows="2" required></textarea>
            </div>

            <div class="mb-3">
                <label for="txt_specialization" class="form-label">Specialization</label>
                <textarea name="txt_specialization" value="{{ editData.specialization }}" id="txt_specialization" class="form-control" rows="2" required></textarea>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="txt_password" class="form-label">Secure Password</label>
                    <input type="password" name="txt_password" id="txt_password" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label for="file_photo" class="form-label">Professional Photo</label>
                    <input type="file" name="file_photo" id="file_photo" class="form-control" accept="image/*" required>
                </div>
            </div>

            <div class="text-center mt-2">
                <button type="submit" class="btn btn-medical me-2">Register Doctor</button>
            </div>

            <div class="text-center">
                <a href="{% url 'webadmin:adminHome' %}" class="back-link"><i class="bi bi-arrow-left me-1"></i> Return
                    to Homepage</a>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
