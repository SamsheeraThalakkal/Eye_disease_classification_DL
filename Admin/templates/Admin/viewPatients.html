<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table class="table table-bordered" border="1">
        <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">Name</th>
                <th scope="col">Email</th>
                 <th scope="col">Gender</th>
                <th scope="col">Phone</th>
                <th scope="col">Address</th>
                 <th scope="col">Photo</th>
                  <th scope="col">Action</th>
                
            </tr>
        </thead>
        <tbody>
            {% for user in patients %}
            <tr>
                <th scope="row">{{ forloop.counter }}</th>
                <td>{{ user.patient_name }}</td>
                <td>{{ user.patient_email }}</td>
                <td>{{ user.patient_gender }}</td>
                <td>{{ user.patient_contact }}</td>
                <td>{{ user.patient_address }}</td>
                <td><img src="{{ user.patient_photo.url }}" alt="Photo" style="width: 100px; height: 100px;"></td>
                <td>
                    <a href="{% url 'webadmin:editPatient' eid=user.id %}" class="btn btn-primary">Edit</a>
                    <a href="{% url 'webadmin:delPatient' pid=user.id %}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this patient?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
</body>
</html>
