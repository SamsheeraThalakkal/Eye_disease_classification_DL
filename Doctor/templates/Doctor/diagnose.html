<!DOCTYPE html>
<html>
<head>
    <title>Smart Vision - Diagnose</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            text-align:center;
            padding-top:40px;
        }
        .card{
            background:white;
            width:500px;
            margin:auto;
            padding:30px;
            border-radius:12px;
            box-shadow:0 6px 15px rgba(0,0,0,0.15);
        }
        input{
            margin:10px 0;
        }
        button{
            padding:10px 25px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }
        button:hover{
            background:#1e7e34;
        }
        .result{
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
            color:#007bff;
        }
        img{
            margin-top:15px;
            max-width:200px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Binocular Fundus Diagnosis</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Left Eye Fundus:</label><br>
        <input type="file" name="left_image" required><br>

        <label>Right Eye Fundus:</label><br>
        <input type="file" name="right_image" required><br><br>

        <button type="submit">Predict Disease</button>
    </form>

    {% if prediction %}
        <div class="result">
            Diagnosis: {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
