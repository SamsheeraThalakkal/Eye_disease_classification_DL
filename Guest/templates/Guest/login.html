<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVision | System Access</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-blue: #0284c7;
            --primary-dark: #0369a1;
            --secondary-teal: #0d9488;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* Abstract Medical Background Pattern (Optional) */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
            z-index: -1;
        }

        .login-card {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* Top Accent Bar */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-blue), var(--secondary-teal));
        }

        .header-content {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 0.5rem;
        }

        .brand-logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Form Controls */
        .form-label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .input-group-text {
            background-color: #f1f5f9;
            border-color: var(--border-color);
            color: var(--text-muted);
        }

        .form-control {
            border-color: var(--border-color);
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 0.25rem rgba(2, 132, 199, 0.15);
        }

        /* Buttons */
        .btn-medical {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 0.75rem;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: background-color 0.2s;
        }

        .btn-medical:hover {
            background-color: var(--primary-dark);
            color: white;
        }

        .btn-outline-medical {
            background-color: white;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .btn-outline-medical:hover {
            background-color: #f1f5f9;
            color: var(--text-main);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-dark);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="bg-pattern"></div>

    <div class="login-card">

        <div class="header-content">
            <i class="bi bi-eye brand-icon"></i>
            <h2 class="brand-logo">SmartVision Portal</h2>
            <p class="subtitle">Secure System Access</p>
        </div>

        <form action="" method="post">
            {% csrf_token %}

            <div class="mb-4">
                <label for="txt_email" class="form-label">Email Address / Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="text" name="txt_email" id="txt_email" class="form-control"
                        placeholder="user@example.com" autocomplete="off" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="txt_pass" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="txt_pass" id="txt_pass" class="form-control" placeholder="••••••••"
                        required>
                </div>
            </div>

            <div class="d-grid gap-3 mt-4">
                <button type="submit" class="btn btn-medical">Secure Login</button>
            </div>

            <div class="text-center mt-4">
                <a href="{% url 'webguest:guestHome' %}" class="back-link"><i class="bi bi-arrow-left me-1"></i> Return
                    to Homepage</a>
            </div>
        </form>
    </div>

    {% if msg %}
    <script>
        setTimeout(function () {
            alert("{{msg}}");
        }, 100);
    </script>
    {% endif %}

</body>

</html>
